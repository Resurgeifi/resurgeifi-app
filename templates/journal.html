<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Journal | Resurgifi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background-color: #ffffff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    label {
      font-size: 1.2rem;
    }

    textarea {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 0.5rem;
    }

    button {
      background-color: #48bb78;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #38a169;
    }

    .entry-box {
      background: #2d3748;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 10px;
      color: #f7fafc;
    }

    .timestamp {
      font-size: 0.9rem;
      color: #a0aec0;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Your Journal</h1>

    <form method="POST" action="/journal">
      <label for="entry"><strong>What’s on your mind today?</strong></label><br><br>
      <textarea 
        name="entry" 
        rows="6" 
        placeholder="Just write what you feel. The point of a journal is to get those rocks moving around, on the paper."
      ></textarea><br>
      <button type="submit">Save Entry</button>
    </form>
    
    <hr style="margin: 2rem 0;">    

    {% if entries %}
      <h2>Previous Entries</h2>
      {% for entry in entries %}
        <div class="entry-box">
          <div class="timestamp">{{ entry.timestamp.strftime('%B %d, %Y %I:%M %p') }}</div>
          <div>{{ entry.content }}</div>
        </div>
      {% endfor %}
    {% else %}
      <p>No entries yet. Your story starts now.</p>
    {% endif %}
  </div>
</body>
</html>
