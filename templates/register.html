{% extends "base.html" %}

{% block title %}Register | Resurgifi{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px;">
  <h1>🔐 Join Resurgifi</h1>
  <p class="mantra">Start your journey — we’ve been waiting for you.</p>

  {% if error %}
    <p style="color: #d9534f; font-weight: bold;">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/register">
    <label for="username">Username</label><br>
    <input type="text" name="username" required><br><br>

    <label for="password">Password</label><br>
    <input type="password" name="password" required><br><br>

    <label for="display_name">Display Name (optional)</label><br>
    <input type="text" name="display_name"><br><br>

    <button type="submit">Register</button>
  </form>
</div>
{% endblock %}
